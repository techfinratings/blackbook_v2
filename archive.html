<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>자료실 — BLACK BOOK</title>
<meta name="description" content="크레디뷰가 정리한 실무 서식·템플릿·요약 자료. 바로 내려받아 오늘의 장부에 붙여 쓰세요.">
<link rel="stylesheet" href="/assets/styles.css">
<style>
  .split{display:grid;grid-template-columns:1.6fr .9fr;gap:44px;align-items:start;}
  .file-row2{display:grid;grid-template-columns:42px 1fr auto;gap:16px;align-items:center;padding:18px 2px;border-bottom:1px solid var(--rule-hair);cursor:pointer;}
  .ftile{width:42px;height:42px;display:flex;align-items:center;justify-content:center;font-size:10.5px;font-weight:600;color:#fff;border-radius:3px;font-family:var(--font-mono);}
  .side-stack{display:flex;flex-direction:column;gap:30px;position:sticky;top:88px;}
  .stat-line{display:flex;align-items:baseline;justify-content:space-between;padding:11px 0;border-bottom:1px solid var(--rule-soft);}
  .pop-row{display:flex;align-items:center;gap:12px;padding:13px 0;border-bottom:1px solid var(--rule-hair);cursor:pointer;}
  @media (max-width:820px){.side-stack{position:static;}}
</style>
</head>
<body>
<div class="grain"></div>
<div class="fore-edge"></div>
<div class="page">
  <header class="gnb"><div class="wrap gnb-inner">
    <a href="/"><img class="gnb-logo" src="/assets/logo_white.png" alt="BLACK BOOK"></a>
    <nav class="gnb-nav"><a href="/">홈</a><a href="/content">콘텐츠</a><a href="/community/talk">실무 이야기</a><a href="/archive" class="active">자료실</a><a href="/calendar">캘린더</a><a href="/finder">파인더</a></nav>
    <span class="gnb-login">로그인</span><span class="gnb-join">회원가입</span>
  </div></header>

  <div class="wrap" style="max-width:1020px;padding-top:40px;">
    <div class="eyebrow">INDEX 03 — 자료실</div>
    <div style="display:flex;align-items:flex-end;justify-content:space-between;gap:24px;flex-wrap:wrap;margin-top:12px;">
      <div>
        <h1 class="page-title" style="font-size:38px;">자료실</h1>
        <p class="page-intro" style="max-width:560px;margin:9px 0 0;">크레디뷰가 정리한 실무 서식·템플릿·요약 자료.<br>바로 내려받아 오늘의 장부에 붙여 쓰세요.</p>
      </div>
      <label style="flex-shrink:0;display:flex;align-items:center;gap:9px;border:1px solid #D8DCE0;border-radius:3px;padding:10px 14px;background:#fff;">
        <svg viewBox="0 0 24 24" fill="none" stroke="#7E868F" stroke-width="1.8" style="width:15px;height:15px;"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3" stroke-linecap="round"/></svg>
        <input id="search" placeholder="자료 검색" class="mono" style="border:0;outline:none;background:transparent;font-size:12.5px;color:var(--ink-1);width:150px;">
      </label>
    </div>
  </div>

  <div class="wrap split" style="max-width:1020px;padding-top:26px;padding-bottom:72px;">
    <div style="min-width:0;">
      <div style="display:flex;align-items:flex-end;justify-content:space-between;border-bottom:1.5px solid var(--ink-1);">
        <div class="tabbar" id="segs" style="border-bottom:0;">
          <button data-seg="new" class="on">최신</button>
          <button data-seg="hot">인기</button>
        </div>
        <span class="mono" style="font-size:11px;color:var(--ink-3);padding-bottom:11px;" id="count"></span>
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:7px;margin-top:16px;" id="filters"></div>
      <div id="files" style="margin-top:8px;"></div>
      <div style="display:flex;justify-content:center;margin-top:40px;"><button class="btn-outline">더 펼치기 ↓</button></div>
    </div>

    <div class="side-stack">
      <div class="side-card">
        <div class="mono" style="font-size:10px;letter-spacing:.1em;color:var(--ink-3);padding:15px 18px 0;">오늘의 장부</div>
        <div style="padding:6px 18px 14px;">
          <div class="stat-line"><span style="font-size:13px;color:var(--ink-2);">누적 자료</span><span class="mono" style="font-size:15px;font-weight:600;">1,240</span></div>
          <div class="stat-line"><span style="font-size:13px;color:var(--ink-2);">이번 달 추가</span><span class="mono" style="font-size:15px;font-weight:600;">38</span></div>
          <div class="stat-line" style="border-bottom:0;"><span style="font-size:13px;color:var(--ink-2);">총 내려받기</span><span class="mono" style="font-size:15px;font-weight:600;">24,800</span></div>
        </div>
      </div>
      <div>
        <div class="sec-head" style="padding-bottom:9px;"><h3 class="bt" style="font-size:18px;">이번 주 많이 받은 자료</h3></div>
        <div id="popular"></div>
      </div>
      <div class="side-cta">
        <div class="bt" style="font-size:17px;font-weight:700;line-height:1.5;">필요한 자료가 없나요?</div>
        <p style="font-size:12.5px;color:var(--ink-4);line-height:1.65;margin:8px 0 16px;">실무에 필요한 서식을 요청하면 크레디뷰가 정리해 올립니다.</p>
        <span class="btn">자료 요청하기</span>
      </div>
    </div>
  </div>

  <footer class="footer"><div class="wrap" style="padding:40px 40px 32px;display:flex;justify-content:space-between;align-items:center;gap:20px;flex-wrap:wrap;"><img src="/assets/logo_white.png" style="height:20px;" alt="BLACK BOOK"><div class="mono" style="font-size:10.5px;color:#6A7079;">© 2025 BLACK BOOK · 크레디뷰</div></div></footer>
</div>

<script>
(function () {
  var TCOL = { XLS:'#1F8455', PPT:'#C2611B', PDF:'#B4322B', DOC:'#2348D6', MD:'#49505A', HWP:'#6A3FC0' };
  var CCOL = { 세무:'#C2611B', 회계:'#1F8455', 법령:'#6A3FC0', 실무:'#2348D6', 경영:'#181B1E', 재무:'#2348D6', 정책자금:'#2348D6' };
  var DATA = [
    { type:'XLS', name:'현금흐름 추정 템플릿', desc:'3개년 추정과 시나리오 분석이 연결된 표준 양식', cat:'재무', date:'2일 전', size:'142KB', dl:2480, days:2 },
    { type:'PDF', name:'2025 세법개정 요약', desc:'법인·소득·부가세 주요 개정 항목 한 장 정리', cat:'세무', date:'1주 전', size:'860KB', dl:3240, days:7 },
    { type:'XLS', name:'부가세 신고 체크시트', desc:'예정·확정 신고 전 점검 항목과 산식', cat:'세무', date:'3일 전', size:'88KB', dl:1760, days:3 },
    { type:'PPT', name:'여신심사 보고 양식', desc:'거래처 재무 요약과 한도 의견을 담는 보고 템플릿', cat:'재무', date:'5일 전', size:'3.1MB', dl:1120, days:5 },
    { type:'MD', name:'결산 마감 체크리스트', desc:'월·분기 결산 부서별 취합 항목 체크리스트', cat:'실무', date:'2일 전', size:'18KB', dl:2010, days:2 },
    { type:'DOC', name:'법인세 결산 조정 명세 양식', desc:'세무조정 계산서 작성용 표준 서식', cat:'회계', date:'6일 전', size:'210KB', dl:940, days:6 },
    { type:'PDF', name:'중대재해처벌법 대응 가이드', desc:'재무·관리팀이 확인할 예산·증빙 관리 포인트', cat:'법령', date:'1주 전', size:'1.4MB', dl:620, days:8 },
    { type:'XLS', name:'운전자본 관리 대시보드', desc:'DSO·DIO·DPO 추이와 현금전환주기 자동 계산', cat:'재무', date:'4일 전', size:'320KB', dl:1380, days:4 },
    { type:'PPT', name:'이사회 재무보고 템플릿', desc:'런웨이·핵심 지표를 한 장에 담는 보고 양식', cat:'경영', date:'1주 전', size:'2.6MB', dl:780, days:9 },
    { type:'PDF', name:'정책자금 신청 서류 모음', desc:'주요 정책자금별 제출 서류 체크리스트', cat:'정책자금', date:'3일 전', size:'2.1MB', dl:1520, days:3 }
  ];
  var FILTERS = ['전체','세무','회계','재무','법령','실무','경영','정책자금'];
  var RANKCOL = ['#2348D6','#2348D6','#2348D6','#C2C9D0'];
  var seg = 'new', filter = '전체', query = '';
  var fmt = function (n) { return n.toLocaleString('en-US'); };

  function renderFilters() {
    document.getElementById('filters').innerHTML = FILTERS.map(function (f) {
      return '<button class="filter' + (f === filter ? ' on' : '') + '" data-f="' + f + '">' + f + '</button>';
    }).join('');
  }
  function renderFiles() {
    var list = DATA.slice();
    if (seg === 'hot') list.sort(function (a, b) { return b.dl - a.dl; });
    else list.sort(function (a, b) { return a.days - b.days; });
    if (filter !== '전체') list = list.filter(function (f) { return f.cat === filter; });
    if (query) list = list.filter(function (f) { return (f.name + f.desc).toLowerCase().indexOf(query.toLowerCase()) >= 0; });
    document.getElementById('count').textContent = list.length + '건';
    document.getElementById('files').innerHTML = list.map(function (f) {
      return '<div class="file-row2">' +
        '<span class="ftile" style="background:' + (TCOL[f.type] || '#49505A') + ';">' + f.type + '</span>' +
        '<div style="min-width:0;"><div style="font-size:15px;font-weight:600;line-height:1.4;">' + f.name + '</div>' +
        '<div style="font-size:12.5px;color:#7E868F;line-height:1.5;margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">' + f.desc + '</div>' +
        '<div style="display:flex;align-items:center;gap:8px;margin-top:7px;flex-wrap:wrap;"><span class="mono" style="font-size:10px;color:' + (CCOL[f.cat] || '#181B1E') + ';">' + f.cat + '</span><span style="color:#D8DCE0;">·</span><span class="mono" style="font-size:10px;color:#7E868F;">업데이트 ' + f.date + '</span><span style="color:#D8DCE0;">·</span><span class="mono" style="font-size:10px;color:#7E868F;">' + f.size + ' · 내려받기 ' + fmt(f.dl) + '</span></div></div>' +
        '<span style="display:flex;align-items:center;gap:6px;font-size:12.5px;font-weight:600;color:#49505A;border:1px solid #D8DCE0;border-radius:3px;padding:9px 15px;cursor:pointer;white-space:nowrap;">↓ 내려받기</span></div>';
    }).join('') || '<div class="mono" style="color:#7E868F;padding:20px 0;">검색 결과가 없습니다.</div>';
  }
  document.getElementById('popular').innerHTML = DATA.slice().sort(function (a, b) { return b.dl - a.dl; }).slice(0, 4).map(function (p, i) {
    return '<div class="pop-row"><span class="bt" style="font-size:18px;font-weight:700;color:' + RANKCOL[i] + ';width:18px;text-align:center;flex-shrink:0;">' + (i + 1) + '</span>' +
      '<span class="mono" style="font-size:8.5px;font-weight:600;color:#fff;background:' + TCOL[p.type] + ';border-radius:2px;padding:3px 5px;flex-shrink:0;">' + p.type + '</span>' +
      '<div style="min-width:0;flex:1;"><div style="font-size:13px;font-weight:600;line-height:1.4;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">' + p.name + '</div><div class="mono" style="font-size:10px;color:#7E868F;margin-top:1px;">내려받기 ' + fmt(p.dl) + '</div></div></div>';
  }).join('');

  document.getElementById('filters').addEventListener('click', function (e) {
    var b = e.target.closest('[data-f]'); if (!b) return; filter = b.getAttribute('data-f'); renderFilters(); renderFiles();
  });
  document.getElementById('segs').addEventListener('click', function (e) {
    var b = e.target.closest('[data-seg]'); if (!b) return; seg = b.getAttribute('data-seg');
    document.querySelectorAll('#segs button').forEach(function (x) { x.classList.toggle('on', x === b); }); renderFiles();
  });
  document.getElementById('search').addEventListener('input', function (e) { query = e.target.value; renderFiles(); });

  renderFilters(); renderFiles();
})();
</script>
</body>
</html>
