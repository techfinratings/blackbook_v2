<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>블랙북 — 재무 담당자를 위한 지침서</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="stylesheet"
  href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css"
  media="print" onload="this.media='all'">
<style>
@font-face {
  font-family: 'BookkGothic';
  src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2302@1.0/BookkGothic-Lt.woff2') format('woff2');
  font-weight: 300;
  font-display: swap;
}
@font-face {
  font-family: 'BookkGothic';
  src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2302@1.0/BookkGothic-Bd.woff2') format('woff2');
  font-weight: 700;
  font-display: swap;
}
</style>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family:'Pretendard',-apple-system,'Apple SD Gothic Neo',sans-serif;
    background:#0a0a0a;
    color:#1a1a1a;
    min-height:100vh;
  }

  .bb-page {
    max-width:680px;
    margin:0 auto;
    padding:28px 16px 60px;
    display:flex;
    flex-direction:column;
    gap:14px;
  }

  .bb-card { background:#fff; border-radius:22px; overflow:hidden; }
  .bb-card-inner { padding:28px 24px; }
  .bb-card-dark { background:#111; border:1px solid #1e1e1e; border-radius:22px; overflow:hidden; }

  /* 섹션 공통 */
  .bb-sec-label  { font-size:14px; font-weight:700; letter-spacing:0.12em; color:#aaa; text-transform:uppercase; margin-bottom:6px; }
  .bb-sec-title  { font-size:26px; font-weight:800; color:#0a0a0a; margin-bottom:6px; letter-spacing:-0.02em; }
  .bb-sec-desc   { font-size:18px; color:#888; line-height:1.7; margin-bottom:20px; }

  /* HERO */
  .bb-hero-banner {
    width:100%; border-radius:16px; overflow:hidden; margin-bottom:22px;
    background:#0a0a0a; aspect-ratio:1440/810; position:relative;
  }
  .bb-hero-banner img {
    position:absolute; inset:0; width:100%; height:100%;
    object-fit:cover; display:block;
  }
  .bb-hero-overlay {
    position:absolute; inset:0;
    display:flex; flex-direction:column;
    align-items:center; justify-content:space-between;
    padding:28px 28px 24px;
    background:linear-gradient(to top, rgba(0,0,0,0.65) 0%, rgba(0,0,0,0.25) 50%, transparent 100%);
  }
  .bb-hero-center {
    flex:1; display:flex; flex-direction:column;
    align-items:center; justify-content:center; text-align:center;
  }
  .bb-hero-overlay-title {
    font-size:44px; font-weight:900; letter-spacing:-0.04em;
    color:#fff; line-height:1.1;
    text-shadow:0 2px 20px rgba(0,0,0,0.6);
  }
  .bb-hero-overlay-sub {
    font-size:15px; font-weight:600; color:rgba(255,255,255,0.8);
    letter-spacing:0.06em; margin-top:8px;
    text-shadow:0 1px 8px rgba(0,0,0,0.5);
  }
  .bb-hero-pills {
    display:flex; flex-wrap:nowrap; gap:7px; justify-content:center;
  }
  .bb-pill {
    display:inline-flex; align-items:center; gap:5px; height:36px; padding:0 14px;
    background:rgba(255,255,255,0.15); border:1px solid rgba(255,255,255,0.35);
    border-radius:999px; backdrop-filter:blur(6px);
    font-size:14px; font-weight:600; color:#fff; cursor:pointer;
    text-decoration:none; transition:background .15s,border-color .15s;
    font-family:'Pretendard',sans-serif; white-space:nowrap;
  }
  .bb-pill:hover { background:#0046FF; border-color:#0046FF; color:#fff; }

  /* ── D-day 배너 ── */
  .bb-dday {
    display:flex; flex-direction:column; gap:10px;
    background:#eef2ff; border:1.5px solid #d0d9ff;
    border-radius:14px; padding:14px 18px; margin-bottom:18px;
  }
  .bb-dday-row { display:flex; align-items:center; gap:14px; }
  .bb-dday-row + .bb-dday-row {
    padding-top:10px; border-top:1px solid #dce5ff;
  }
  .bb-dday-badge {
    font-size:22px; font-weight:900; color:#0046FF;
    flex-shrink:0; letter-spacing:-0.03em; min-width:54px;
  }
  .bb-dday-badge.today { color:#e03030; }
  .bb-dday-row.dim .bb-dday-badge { font-size:18px; color:#7a9de0; }
  .bb-dday-divider { width:1px; height:36px; background:#c8d3ff; flex-shrink:0; }
  .bb-dday-info { flex:1; min-width:0; }
  .bb-dday-title { font-size:15px; font-weight:700; color:#1a1a1a; line-height:1.4; }
  .bb-dday-date  { font-size:13px; color:#888; margin-top:3px; }
  .bb-dday-row.dim .bb-dday-title { color:#666; font-weight:600; }
  .bb-dday-row.dim .bb-dday-date  { color:#aaa; }

  /* ── 01 캘린더 ── */
  .bb-cal-mock { background:#f5f7ff; border-radius:16px; padding:18px; }
  .bb-cal-top  { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; }
  .bb-cal-month { font-size:18px; font-weight:700; color:#1a1a1a; }
  .bb-cal-arrows { display:flex; gap:4px; }
  .bb-cal-arrows button {
    background:#fff; border:1px solid #e0e4ff; border-radius:8px;
    width:32px; height:32px; cursor:pointer; font-size:18px; color:#555;
    display:flex; align-items:center; justify-content:center;
    font-family:'Pretendard',sans-serif;
  }
  .bb-cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:3px; text-align:center; }
  .bb-dow { font-size:13px; font-weight:700; color:#ccc; padding:3px 0 7px; letter-spacing:0.05em; }
  .bb-day {
    aspect-ratio:1; border-radius:8px;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    font-size:14px; color:#444; cursor:pointer; transition:background .12s; font-weight:500;
  }
  .bb-day:hover { background:#e0e8ff; }
  .bb-day.ev    { background:#eaedff; }
  .bb-day.td    { border:2px solid #0046FF; }
  .bb-day.sel   { background:#0046FF; color:#fff; font-weight:700; }
  .bb-day.sel .bb-dot { background:rgba(255,255,255,.6); }
  .bb-dot { width:4px; height:4px; border-radius:50%; background:#0046FF; margin-top:2px; }

  .bb-date-panel { margin-top:12px; background:#fff; border:1px solid #d8e0ff; border-radius:12px; padding:12px 14px; }
  .bb-date-panel-hd { font-size:15px; font-weight:700; color:#0046FF; margin-bottom:8px; }
  .bb-date-panel-list { list-style:none; display:flex; flex-direction:column; gap:6px; }
  .bb-date-panel-item {
    font-size:15px; color:#333; padding:6px 8px; background:#f5f7ff;
    border-radius:8px; line-height:1.5; display:flex; align-items:baseline; gap:6px;
  }
  .bb-date-panel-item a { color:#0046FF; text-decoration:none; font-weight:600; }
  .bb-date-panel-item a:hover { text-decoration:underline; }
  .bb-ev-tag { font-size:12px; font-weight:700; flex-shrink:0; padding:1px 6px; border-radius:4px; }
  .bb-ev-end   { background:#ffecec; color:#e03030; }
  .bb-ev-start { background:#e8f5e9; color:#2e7d32; }

  .bb-chips { display:flex; flex-wrap:wrap; gap:6px; margin-top:14px; }
  .bb-chip  { font-size:14px; background:#fff; border:1px solid #d8e0ff; border-radius:999px; padding:4px 12px; color:#0046FF; font-weight:600; }

  /* ── 02 계산기 ── */
  .bb-calc-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:16px; }
  .bb-field label { font-size:14px; color:#aaa; font-weight:600; display:block; margin-bottom:5px; letter-spacing:0.03em; }
  .bb-field input,.bb-field select {
    width:100%; padding:9px 12px; border:1.5px solid #ebebeb; border-radius:10px;
    font-size:18px; color:#222; background:#fafafa;
    font-family:'Pretendard',sans-serif; outline:none; transition:border-color .15s;
  }
  .bb-field input:focus,.bb-field select:focus { border-color:#0046FF; }
  .bb-calc-output { background:#0a0a0a; border-radius:14px; padding:20px 22px; display:flex; align-items:center; justify-content:space-between; gap:16px; }
  .bb-calc-label { font-size:14px; color:#666; margin-bottom:5px; }
  .bb-calc-val   { font-size:51px; font-weight:900; color:#0046FF; line-height:1; }
  .bb-calc-sub   { font-size:14px; color:#444; margin-top:7px; }
  .bb-meter { width:86px; height:86px; position:relative; flex-shrink:0; }
  .bb-meter svg { transform:rotate(-90deg); display:block; }
  .bb-meter-num { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); font-size:20px; font-weight:800; color:#0046FF; }
  .bb-cta-btn {
    display:block; width:100%; margin-top:12px; padding:14px;
    background:#0a0a0a; color:#fff; border:none; border-radius:12px;
    font-size:19px; font-weight:700; cursor:pointer;
    font-family:'Pretendard',sans-serif; transition:background .2s;
  }
  .bb-cta-btn:hover { background:#0046FF; }

  /* ── 자료실 (에디토리얼 리디자인) ── */
  .bb-res-ed {
    font-family:'BookkGothic','Pretendard',sans-serif;
    background:#fff; border:1.5px solid #0a0a0a; border-radius:4px; overflow:hidden;
  }
  .bb-res-ed-inner { padding:28px 26px 20px; }
  .bb-res-ed-eyebrow {
    font-size:11px; font-weight:300; letter-spacing:0.22em;
    color:#999; text-transform:uppercase; margin-bottom:10px;
  }
  .bb-res-ed-title {
    font-size:38px; font-weight:700; color:#0a0a0a;
    letter-spacing:-0.03em; line-height:1.1; margin-bottom:6px;
  }
  .bb-res-ed-sub {
    font-size:13px; font-weight:300; color:#888; line-height:1.6;
    padding-bottom:20px; border-bottom:1px solid #e0e0e0; margin-bottom:4px;
  }
  .bb-res-ed-list { list-style:none; }
  .bb-res-ed-item {
    display:flex; align-items:center; gap:14px;
    padding:15px 0; border-bottom:1px solid #efefef;
    cursor:pointer; transition:opacity .15s;
  }
  .bb-res-ed-item:last-child { border-bottom:none; }
  .bb-res-ed-item:hover { opacity:.65; }
  .bb-res-ed-num {
    font-size:12px; font-weight:300; color:#ccc;
    letter-spacing:0.05em; flex-shrink:0; width:22px; text-align:right;
  }
  .bb-res-ed-info { flex:1; min-width:0; }
  .bb-res-ed-name {
    font-size:15px; font-weight:700; color:#0a0a0a;
    line-height:1.4; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .bb-res-ed-meta { font-size:12px; font-weight:300; color:#aaa; margin-top:3px; }
  .bb-res-ed-badge {
    font-size:11px; font-weight:700; letter-spacing:0.08em;
    color:#0a0a0a; background:#f2f2f2; border:1px solid #ddd;
    padding:3px 8px; border-radius:2px; flex-shrink:0;
  }
  /* 기존 .bb-badge 유지 */
  .bb-badge { font-size:13px; font-weight:700; padding:3px 9px; border-radius:6px; letter-spacing:0.04em; flex-shrink:0; }
  .bb-badge-md  { background:#00133a; color:#0046FF; }
  .bb-badge-xl  { background:#002a10; color:#00cc55; }
  .bb-badge-pdf { background:#2a0800; color:#ff4422; }
  .bb-badge-ppt { background:#2a1400; color:#ff9922; }

  /* ── 03 인블로그 포스트 ── */
  .bb-posts { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
  .bb-post  { background:#f5f5f5; border-radius:14px; overflow:hidden; cursor:pointer; transition:transform .15s; text-decoration:none; display:block; }
  .bb-post:hover { transform:translateY(-2px); }
  .bb-post-thumb { width:100%; aspect-ratio:16/9; display:flex; align-items:center; justify-content:center; font-size:30px; overflow:hidden; }
  .bb-post-thumb img { width:100%; height:100%; object-fit:cover; display:block; }
  .bb-post-body  { padding:12px 14px 16px; }
  .bb-post-cat   { font-size:13px; font-weight:700; color:#0046FF; letter-spacing:0.08em; margin-bottom:4px; }
  .bb-post-title { font-size:15px; font-weight:700; line-height:1.5; color:#1a1a1a; margin-bottom:5px; }
  .bb-post-date  { font-size:13px; color:#bbb; }
  .bb-more { display:none; width:fit-content; margin:16px auto 0; padding:10px 24px; background:#f2f2f2; border:none; border-radius:999px; font-size:15px; font-weight:700; color:#333; cursor:pointer; font-family:'Pretendard',sans-serif; transition:background .15s,color .15s; }
  .bb-more:hover { background:#0046FF; color:#fff; }

  /* ── 04 기고 콘텐츠 텍스트 카드 ── */
  .bb-contrib-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; }
  .bb-contrib-card {
    background:#f8f8f8; border:1px solid #ebebeb; border-radius:14px; padding:18px;
    display:flex; flex-direction:column; gap:8px;
    cursor:pointer; transition:border-color .15s,transform .15s; text-decoration:none;
  }
  .bb-contrib-card:hover { border-color:#0046FF; transform:translateY(-2px); }
  .bb-contrib-source { font-size:14px; font-weight:700; color:#0046FF; letter-spacing:0.06em; }
  .bb-contrib-title  { font-size:18px; font-weight:700; color:#1a1a1a; line-height:1.45; }
  .bb-contrib-desc   { font-size:14px; color:#888; line-height:1.65; flex:1; }
  .bb-contrib-footer { display:flex; justify-content:space-between; align-items:center; margin-top:4px; }
  .bb-contrib-date   { font-size:13px; color:#bbb; }
  .bb-contrib-link   { font-size:14px; font-weight:700; color:#0046FF; text-decoration:none; }
  .bb-contrib-link:hover { text-decoration:underline; }

  /* ── Footer ── */
  .bb-footer { background:#111; border:1px solid #1e1e1e; border-radius:22px; padding:22px 24px; text-align:center; font-size:15px; color:#444; line-height:1.8; }
  .bb-footer a { color:#555; text-decoration:none; }
  .bb-footer a:hover { color:#0046FF; }

  /* ── 반응형 ── */
  @media (max-width:560px) {
    .bb-posts        { grid-template-columns:1fr; }
    .bb-contrib-grid { grid-template-columns:1fr; }
    .bb-calc-grid    { grid-template-columns:1fr; }
    .bb-page         { padding:16px 12px 48px; gap:10px; }
    .bb-card-inner   { padding:22px 18px; }
  }
</style>
</head>
<body>
<div class="bb-page">

  <!-- HERO -->
  <div class="bb-card">
    <div class="bb-card-inner">
      <div class="bb-hero-banner">
        <img src="/assets/hero.png" alt="블랙북" loading="eager">
        <div class="bb-hero-overlay">
          <div class="bb-hero-center">
            <div class="bb-hero-overlay-title">BLACK BOOK</div>
            <div class="bb-hero-overlay-sub">재무 담당자를 위한 지침서</div>
          </div>
          <div class="bb-hero-pills">
            <a href="#bb-sec02" class="bb-pill">🏦 대출 계산기</a>
            <a href="/archive" class="bb-pill">📂 자료실</a>
            <a href="#bb-sec03" class="bb-pill">✍️ 재무 콘텐츠</a>
            <a href="#bb-sec04" class="bb-pill">📝 기고 콘텐츠</a>
          </div>
        </div>
    </div>
  </div>

  <!-- 01 재무 캘린더 -->
  <div class="bb-card" id="bb-sec01">
    <div class="bb-card-inner">
      <p class="bb-sec-label">01 — 재무 캘린더</p>
      <h2 class="bb-sec-title">재무 캘린더</h2>
      <div class="bb-dday" id="cal-dday" style="display:none"></div>
      <div class="bb-cal-mock">
        <div class="bb-cal-top">
          <span class="bb-cal-month" id="cal-month-label">2026년 5월</span>
          <div class="bb-cal-arrows">
            <button id="cal-prev">‹</button>
            <butto
