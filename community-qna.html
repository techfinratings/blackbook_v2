<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>실무 이야기 — BLACK BOOK</title>
<meta name="description" content="실무자와 크레디뷰가 함께 답을 채우는 문답 스레드.">
<link rel="stylesheet" href="/assets/styles.css">
<style>
  .read{max-width:800px;margin:0 auto;padding:40px 24px 72px;}
  .qbody{font-size:15.5px;line-height:1.8;color:#2C313A;white-space:pre-line;}
  .abody{font-size:15px;line-height:1.8;color:#2C313A;white-space:pre-line;}
  .out-btn{display:flex;align-items:center;gap:6px;font-size:12.5px;font-weight:600;color:var(--ink-2);border:1px solid #D8DCE0;border-radius:3px;padding:7px 13px;cursor:pointer;background:none;}
</style>
</head>
<body>
<div class="grain"></div>
<div class="fore-edge"></div>
<div class="page">
  <header class="gnb"><div class="wrap gnb-inner">
    <a href="/"><img class="gnb-logo" src="/assets/logo_white.png" alt="BLACK BOOK"></a>
    <nav class="gnb-nav"><a href="/">홈</a><a href="/content">콘텐츠</a><span class="has-sub"><a class="hb-toggle active">실무 핸드북<i>▾</i></a><span class="gnb-sub"><a href="/guide">실무 노트</a><a href="/community/talk">실무 이야기</a></span></span><a href="/archive">실무자료 아카이브</a><a href="/calendar">캘린더</a><a href="/finder">파인더</a></nav>
    <span class="gnb-login">로그인</span><span class="gnb-join">회원가입</span>
  </div></header>

  <div class="read">
    <a href="/community/talk" style="display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:600;color:var(--ink-3);">← 실무 이야기</a>
    <div id="thread"><div class="mono" style="color:#7E868F;padding:40px 0;">불러오는 중…</div></div>
  </div>

  <footer class="footer"><div class="wrap" style="padding:40px 40px 32px;display:flex;justify-content:space-between;align-items:center;gap:20px;flex-wrap:wrap;"><img src="/assets/logo_white.png" style="height:20px;" alt="BLACK BOOK"><div class="mono" style="font-size:10.5px;color:#6A7079;">© 2025 BLACK BOOK · 크레디뷰</div></div></footer>
</div>

<script>
(function () {
  var COL = { 세무:'#C2611B', 회계:'#1F8455', 법령:'#6A3FC0', 실무:'#2348D6', 경영:'#181B1E', 재무:'#2348D6', 정책자금:'#2348D6' };
  var esc = function (s) { return String(s == null ? '' : s).replace(/[&<>"]/g, function (c) { return { '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;' }[c]; }); };
  function timeLabel(ts) {
    var t = Date.parse(ts); if (isNaN(t)) return '';
    var m = Math.max(0, (Date.now() - t) / 60000);
    if (m < 1) return '방금 전'; if (m < 60) return Math.round(m) + '분 전';
    if (m < 1440) return Math.round(m / 60) + '시간 전'; return Math.floor(m / 1440) + '일 전';
  }
  var qid = new URLSearchParams(location.search).get('id');
  var thread = document.getElementById('thread');

  // 샘플(id 없이 접근 시 폴백)
  var SAMPLE = {
    question: { id:'', category:'세무', title:'관계회사 대여금, 업무무관 가지급금으로 보는 기준이 어디까지인가요?', ts:new Date(Date.now()-15*60000).toISOString(), content:'거래처가 아닌 관계회사(지분 40%)에 운영자금을 대여했습니다. 이자율은 가중평균차입이자율로 받고 있는데, 세무조사에서 업무무관 가지급금으로 볼 여지가 있는지 궁금합니다.\n\n인정이자 계산이나 지급이자 손금불산입까지 걸리는 기준선이 실무적으로 어디쯤인지, 소명 자료는 어디까지 준비해 두시는지 경험 있으신 분들 의견 부탁드립니다.', tags:['가지급금','특수관계자'], anonymous:true },
    answers: [
      { official:true, author:'크레디뷰 리서치', ts:new Date(Date.now()-12*60000).toISOString(), helpful:42, content:'업무무관 가지급금 판단의 핵심은 ‘대여의 업무 관련성’입니다. 관계회사라는 사실만으로 곧바로 업무무관이 되지는 않지만, ① 대여의 사업상 필요성, ② 적정 이자의 수취, ③ 회수 계획의 구체성이 소명되지 않으면 세무상 업무무관으로 재구성될 수 있습니다.\n\n가중평균차입이자율 이상으로 이자를 받고 계신다면 인정이자 이슈는 크지 않습니다. 다만 대여 규모가 자기자본 대비 과도하거나 회수가 장기 지연되면 지급이자 손금불산입 대상이 될 수 있으니, 이사회 결의서·금전소비대차 약정서·회수 이력을 함께 갖춰 두시길 권합니다.' },
      { official:false, author:'이세무', ts:new Date(Date.now()-8*60000).toISOString(), helpful:9, content:'실무에서는 ‘왜 이 시점에, 왜 이 회사에 빌려줬는가’에 대한 사업상 이유를 문서로 남기는 게 가장 중요합니다. 이자율만 맞춰 두고 근거 서류가 없으면 조사에서 방어가 어렵습니다.' }
    ]
  };

  function renderQuestion(q) {
    var col = COL[q.category] || '#181B1E';
    var tags = (q.tags || []).map(function (t) { return '<span class="mono" style="font-size:10.5px;color:#49505A;background:#EEF0F2;padding:5px 10px;border-radius:3px;">#' + esc(t) + '</span>'; }).join('');
    return '<div style="margin-top:22px;">' +
      '<div style="display:flex;align-items:center;gap:11px;"><span class="mono" style="font-size:10.5px;letter-spacing:.05em;color:' + col + ';">' + esc(q.category) + '</span><span class="mono" style="font-size:10.5px;color:#9BA3AB;">' + timeLabel(q.ts) + '</span></div>' +
      '<h1 class="bt" style="font-size:29px;line-height:1.45;font-weight:700;margin:12px 0 0;">' + esc(q.title) + '</h1>' +
      '<div class="qbody" style="margin-top:18px;">' + esc(q.content) + '</div>' +
      (tags ? '<div style="display:flex;gap:7px;flex-wrap:wrap;margin-top:18px;">' + tags + '</div>' : '') +
      '<div style="display:flex;align-items:center;gap:13px;margin-top:22px;padding-top:18px;border-top:1px solid var(--rule-hair);">' +
      '<div class="bt" style="width:36px;height:36px;border-radius:50%;background:#EEF0F2;color:var(--ink-3);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;">' + (q.anonymous ? '익' : '회') + '</div>' +
      '<div style="flex:1;min-width:0;"><div style="font-size:13px;font-weight:700;">' + (q.anonymous ? '익명' : '회원') + '</div></div>' +
      '<span class="out-btn">공감</span><span class="out-btn">스크랩</span></div></div>';
  }
  function renderAnswer(a) {
    var wrap = 'padding:22px ' + (a.official ? '20px' : '2px') + ';border-bottom:1px solid #E1E4E8;' + (a.official ? 'background:#F5F7FE;border-left:2px solid #2348D6;' : '');
    var avatar = 'width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:' + (a.official ? '11px' : '13px') + ';flex-shrink:0;background:' + (a.official ? '#EDF0FD' : '#EEF0F2') + ';color:' + (a.official ? '#2348D6' : '#49505A') + ';';
    var badge = a.official ? '<span class="mono" style="font-size:8.5px;font-weight:600;color:#fff;background:#2348D6;border-radius:2px;padding:2px 6px;">운영사</span>' : '';
    var initial = a.official ? 'CR' : esc((a.author || '?').slice(0, 1));
    return '<div style="' + wrap + '">' +
      '<div style="display:flex;align-items:center;gap:12px;"><div class="' + (a.official ? 'mono' : 'bt') + '" style="' + avatar + '">' + initial + '</div>' +
      '<div style="flex:1;min-width:0;"><div style="display:flex;align-items:center;gap:7px;"><span style="font-size:13.5px;font-weight:700;">' + esc(a.author) + '</span>' + badge + '</div>' +
      '<div class="mono" style="font-size:10.5px;color:#7E868F;margin-top:1px;">' + (a.official ? '기업신용평가사 · 운영사' : '실무자') + '</div></div>' +
      '<span class="mono" style="font-size:10.5px;color:#9BA3AB;">' + timeLabel(a.ts) + '</span></div>' +
      '<div class="abody" style="margin-top:14px;">' + esc(a.content) + '</div>' +
      '<div style="display:flex;align-items:center;gap:10px;margin-top:6px;"><span class="out-btn" style="padding:6px 12px;">도움돼요 <span class="mono">' + a.helpful + '</span></span><span style="font-size:12px;font-weight:600;color:#7E868F;cursor:pointer;">답글</span></div></div>';
  }

  function render(q, answers) {
    document.title = q.title + ' — BLACK BOOK';
    var ansHtml = answers.length ? answers.map(renderAnswer).join('')
      : '<div class="mono" style="color:#7E868F;padding:20px 0;">아직 답변이 없어요. 첫 답변을 남겨 주세요.</div>';
    thread.innerHTML = renderQuestion(q) +
      '<div class="sec-head" style="padding-bottom:10px;margin-top:44px;"><h2 class="bt" style="font-size:21px;">답변 <span class="mono" style="font-size:14px;font-weight:500;color:var(--ink-3);">' + answers.length + '</span></h2><span class="mono" style="font-size:11px;color:var(--ink-3);">누구나 답할 수 있어요</span></div>' +
      '<div>' + ansHtml + '</div>' +
      '<div style="margin-top:36px;border:1px solid var(--rule-hair);background:#fff;padding:20px;">' +
        '<div class="mono" style="font-size:10px;letter-spacing:.1em;color:var(--ink-3);">답변 기입</div>' +
        '<textarea id="ansText" class="field" placeholder="겪은 것을 한 줄씩. 근거가 되는 조문·사례가 있다면 함께 적어 주세요." style="margin-top:10px;min-height:110px;line-height:1.7;resize:vertical;font-size:14px;"' + (q.id ? '' : ' disabled') + '></textarea>' +
        '<div style="display:flex;align-items:center;justify-content:space-between;margin-top:12px;gap:12px;">' +
          '<label style="display:flex;align-items:center;gap:7px;font-size:12.5px;color:var(--ink-2);cursor:pointer;"><input id="ansAnon" type="checkbox" style="accent-color:#2348D6;width:15px;height:15px;">익명으로 답변</label>' +
          '<div style="display:flex;align-items:center;gap:10px;"><span class="mono" id="ansMsg" style="font-size:10.5px;color:var(--ink-3);"></span>' +
          '<button id="ansSubmit" class="btn-ink" style="font-size:13px;padding:10px 22px;border-radius:3px;border:0;"' + (q.id ? '' : ' disabled title="샘플 글에는 답변할 수 없어요"') + '>답변 기입하기</button></div>' +
        '</div>' +
        (q.id ? '' : '<p class="mono" style="font-size:10px;color:var(--ink-4);margin:10px 0 0;">* 예시 글입니다. 실제 문답에서 답변을 남길 수 있어요.</p>') +
      '</div>';
    if (q.id) wireAnswerForm(q.id);
  }

  function wireAnswerForm(id) {
    var txt = document.getElementById('ansText'), anon = document.getElementById('ansAnon'),
        btn = document.getElementById('ansSubmit'), msg = document.getElementById('ansMsg');
    btn.addEventListener('click', function () {
      var content = txt.value.trim();
      if (!content) { msg.style.color = '#B4322B'; msg.textContent = '내용을 입력해 주세요.'; txt.focus(); return; }
      btn.disabled = true; msg.style.color = '#7E868F'; msg.textContent = '등록 중…';
      fetch('/api/answers', { method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ qid:id, content:content, author: anon.checked ? '익명' : '회원', official:false }) })
        .then(function (r) { return r.ok ? r.json() : Promise.reject(); })
        .then(function () { location.reload(); })
        .catch(function () { btn.disabled = false; msg.style.color = '#B4322B'; msg.textContent = '등록 실패. 잠시 후 다시 시도해 주세요.'; });
    });
  }

  if (!qid) { render(SAMPLE.question, SAMPLE.answers); return; }

  Promise.all([
    fetch('/api/qna?_=' + Date.now(), { cache:'no-store' }).then(function (r) { return r.ok ? r.json() : { items: [] }; }),
    fetch('/api/answers?qid=' + encodeURIComponent(qid) + '&_=' + Date.now(), { cache:'no-store' }).then(function (r) { return r.ok ? r.json() : { items: [] }; })
  ]).then(function (rs) {
    var q = (rs[0].items || []).find(function (x) { return x.id === qid; });
    if (!q) { thread.innerHTML = '<div style="padding:60px 0;text-align:center;"><div class="bt" style="font-size:22px;font-weight:700;">삭제되었거나 찾을 수 없는 글이에요</div><p style="color:var(--ink-3);margin-top:10px;"><a href="/community/talk" style="color:var(--blue);">실무 이야기</a>로 돌아가기</p></div>'; return; }
    var question = { id:q.id, category:q.category, title:q.title, ts:q.ts, content:q.content, tags:(q.tags ? String(q.tags).split(/[\s,]+/).map(function(t){return t.replace(/^#/,'');}).filter(Boolean) : []), anonymous:q.anonymous };
    render(question, rs[1].items || []);
  }).catch(function () { render(SAMPLE.question, SAMPLE.answers); });
})();
</script>
</body>
</html>
